<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/chatgpt.png">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <!-- ── SIDEBAR ──────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">

        <div class="sidebar-top">
            <a href="#" class="sidebar-logo" onclick="return false;">
                <img src="assets/images/chatgpt.png" alt="ChatGPT" class="sidebar-logo-img">
            </a>
            <button class="icon-btn" id="newChatBtn" title="New chat">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
        </div>

        <div class="sidebar-section">
            <button class="new-chat-btn" id="newChatBtn2">
                <i class="fa-solid fa-plus"></i>
                New Chat
            </button>
        </div>

        <!-- Chat history list — populated by JS -->
        <div class="sidebar-history" id="chatHistory"></div>

        <div class="sidebar-bottom">

            <!-- ── Settings ──────────────────────────────────────── -->
            <button class="settings-trigger" id="settingsBtn" title="Settings">
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </button>

            <div class="settings-panel" id="settingsPanel">
                <div class="setting-item">
                    <div class="setting-text">
                        <span class="setting-name">Reading Mode</span>
                        <span class="setting-desc">Show pages instantly — ideal for books</span>
                    </div>
                    <label class="toggle" title="Toggle reading mode">
                        <input type="checkbox" id="readingModeCheck">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    </label>
                </div>
            </div>

            <div class="user-profile">
                <div class="user-avatar">U</div>
                <span class="user-name">User</span>
            </div>
        </div>

    </aside>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ── MAIN CHAT AREA ────────────────────────────────────────────── -->
    <div class="main">

        <!-- Top bar (minimal, like the real ChatGPT app) -->
        <div class="chat-topbar">
            <button class="icon-btn sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="model-selector">
                <span>ChatGPT</span>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
        </div>

        <!-- ── MESSAGES ─────────────────────────────────────────────── -->
        <!-- Welcome screen and messages both live here, managed by JS -->
        <div class="messages" id="messages"></div>

        <!-- ── EPUB NAVIGATION TOOLBAR ──────────────────────────────── -->
        <!-- Shown automatically when an EPUB book is open; hidden otherwise -->
        <div class="epub-toolbar" id="epubToolbar">
            <div class="epub-toolbar-inner">
                <button class="epub-btn" id="epubPrevBtn" title="Previous page (← Prev)">
                    <i class="fa-solid fa-chevron-left"></i>
                    <span>Prev</span>
                </button>
                <div class="epub-info">
                    <span class="epub-chapter-name" id="epubChapterName"></span>
                    <span class="epub-page-num" id="epubPageNum"></span>
                </div>
                <button class="epub-btn" id="epubTocBtn" title="Table of contents">
                    <i class="fa-solid fa-list-ul"></i>
                </button>
                <button class="epub-btn" id="epubGotoBtn" title="Jump to page…">
                    <i class="fa-solid fa-location-crosshairs"></i>
                </button>
                <button class="epub-btn primary" id="epubNextBtn" title="Next page (Next →)">
                    <span>Next</span>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            <div class="epub-progress">
                <div class="epub-progress-fill" id="epubProgressFill"></div>
            </div>
        </div>

        <!-- ── INPUT AREA ───────────────────────────────────────────── -->
        <div class="input-area">
            <div class="input-box-wrap">
                <div class="input-box">
                    <textarea
                        class="chat-input"
                        id="chatInput"
                        placeholder="Message ChatGPT"
                        rows="1"
                        autocomplete="off"
                        spellcheck="false"
                    ></textarea>

                    <div class="input-actions">
                        <div class="input-options">
                            <button class="opt-btn" id="helpBtn" title="Show slash commands">
                                <i class="fa-solid fa-globe"></i>
                                Browse
                            </button>
                        </div>
                        <button class="send-btn inactive" id="sendBtn" title="Send message (Enter)">
                            <i class="fa-solid fa-arrow-up" id="sendIcon" style="display:none"></i>
                            <i class="fa-solid fa-microphone" id="voiceIcon"></i>
                        </button>
                    </div>
                </div>

                <p class="footer-note">
                    ChatGPT can make mistakes. By using it you agree to our
                    <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
                </p>
            </div>
        </div>

    </div>

    <!-- epub.js — EPUB reader (JSZip loaded lazily on first /epub use) -->
    <script src="scripts/epub.js"></script>
    <!-- browser.js defines all state/fetch/render logic; script.js wires up DOM events -->
    <script src="scripts/browser.js"></script>
    <script src="scripts/script.js"></script>
</body>
</html>
